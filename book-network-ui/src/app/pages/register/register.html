<div class="container-fluid card login-container">
  <h3 class="text-center">Create an account</h3>
  <hr>
  @if (errorMsg().length > 0){
    <div class="alert alert-danger" role="alert">
      @for (msg of errorMsg(); track $index){
        <p>{{msg}}</p>
      }
    </div>
  }
  <div class="mb-3">
    <label for="firstName" class="form-label">First name</label>
    <input [(ngModel)]="registerRequest.firstName" type="text" class="form-control" id="firstName" placeholder="Your first name">
  </div>
  <div class="mb-3">
    <label for="lastName" class="form-label">Last name</label>
    <input [(ngModel)]="registerRequest.lastName" type="text" class="form-control" id="lastName" placeholder="Your last name">
  </div>
  <div class="mb-3">
    <label for="login" class="form-label">Email address</label>
    <input [(ngModel)]="registerRequest.email" type="email" class="form-control" id="login" placeholder="name@example.com">
  </div>
  <div class="mb-3">
    <label for="password" class="form-label">Email address</label>
    <input [(ngModel)]="registerRequest.password" type="password" class="form-control" id="password" placeholder="Your password">
  </div>
  <div class="d-flex justify-content-between mb-3">
    <button (click)="register()" type="button" class="btn btn-primary">
      Register
    </button>
    <div>
      Already have an account?&nbsp;
      <button (click)="login()" type="button" class="btn btn-link">
        Log in
      </button>
    </div>
  </div>
</div>
