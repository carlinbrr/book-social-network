<div class="container">
@if (submitted) {
  @if (isOkay) {
    <div class="activation-successful">
      <h2>Activation successful!</h2>
      <p>Your account has been successfully activated.</p>
      <button class="btn btn-primary" routerLink="/login">Go to Login</button>
    </div>
  } @else {
    <div class="activation-error">
      <h2>Activation failed!</h2>
      <p>{{message()}}</p>
      <button class="btn btn-primary" (click)="submitted = false">Try again</button>
    </div>
  }
  } @else {
      <div class="text-center" style="width:400px">
        <h2>Type your activation code</h2>
        <code-input [isCodeHidden]="false"
                    [codeLength]="6"
                    [code]="'number'"
                    (codeCompleted)="onCodeCompleted($event)"
        ></code-input>
      </div>
  }
</div>
