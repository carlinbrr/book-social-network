<h3>Book details</h3>
<hr>
<div class="d-flex gap-3">
  <div class="col-3">
    <img class="rounded-1" width="100%" height="100%" [src]="'data:image/jpg;base64,' + book.cover" alt="">
  </div>
  <div class="col-9">
    <h6><i class="fas fa-book"></i>&nbsp;Title: {{ book.title }}</h6>
    <h6><i class="fas fa-pencil"></i>&nbsp;Author Name: {{ book.authorName }}</h6>
    <h6><i class="fas fa-code"></i>&nbsp;Isbn: {{ book.isbn }}</h6>
    <h6 class="card-subtitle fs-6 text-secondary mb-2">
      <i class="fas fa-user"></i>
      &nbsp;User: {{ book.owner }}
    </h6>
    <div class="d-flex gap-2">
      <app-rating [rating]="book.rate || 0"></app-rating>
      <span>{{ book.rate }} ({{ totalFeedbacks }})</span>
    </div>
    <h6 class="mt-3 mb-0">Synopsis:</h6>
    <p class="mt-0">
      {{ book.synopsis }}
    </p>
  </div>
</div>
<hr>
<app-feedback
  [bookId]="bookId"
  [size]="5"
  (totalFeedbacks)="totalFeedbacks=$event"
></app-feedback>
