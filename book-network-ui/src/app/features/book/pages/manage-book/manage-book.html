<div class="p-2">
  <h2>Manage my book</h2>
  <hr>
  @if (errorMsg().length) {
    <div class="alert alert-danger mt-2">
      @for (msg of errorMsg(); track $index) {
        <p class="p-0 m-0">
          {{msg}}
        </p>
      }
    </div>
  }
  <div class="d-flex gap-2">
    <div class="col-3">
      <img class="rounded-1" width="100%" height="100%" [src]="selectedPicture || 'https://picsum.photos/1900/800'">
      <div class="mt-2">
        <input class="form-control" type="file" id="formFile" accept="image/*" (change)="onFileSelected($event)">
      </div>
    </div>

    <div class="col-9">
      <form class="row g-3">
        <div class="col-12">
          <label for="title" class="form-label">Title</label>
          <input [(ngModel)]="bookRequest.title" name="titleName" type="text" class="form-control" id="title" placeholder="Book title">
        </div>
        <div class="col-6">
          <label for="author" class="form-label">Author name</label>
          <input [(ngModel)]="bookRequest.authorName" name="authorName" type="text" class="form-control" id="author" placeholder="Author name">
        </div>
        <div class="col-6">
          <label for="isbn" class="form-label">Isbn</label>
          <input [(ngModel)]="bookRequest.isbn" name="isbnName" type="text" class="form-control" id="isbn" placeholder="Isbn">
        </div>
        <div class="col-12">
          <label for="synopsis" class="form-label">Synopsis</label>
          <textarea [(ngModel)]="bookRequest.synopsis" name="synopsisName" class="form-control" id="synopsis" rows="4" placeholder="Book synopsis"></textarea>
        </div>
        <div class="col-12">
          <input [(ngModel)]="bookRequest.shareable" name="shareable" type="checkbox" class="form-check-input" id="shareable">
          <label class="form-check-label" for="shareable">&nbsp;Shareable</label>
        </div>
        <div class="d-flex justify-content-end gap-2 col-12">
          <button type="button" class="btn btn-outline-primary" (click)="saveBook()">
            <i class="fas fa-save"></i>
            &nbsp;Save
          </button>
          <a routerLink="/books/my-books" class="btn btn-link text-danger">
            <i class="fas fa-times"></i>
            &nbsp;Cancel
          </a>
        </div>
      </form>
    </div>
  </div>
</div>
