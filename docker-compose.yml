# Local docker-compose.yml file

services:
  postgres-bsn:
    container_name: postgres-bsn
    image: postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      PGDATA: /data/postgres
      POSTGRES_DB: book_social_network
    volumes:
      - postgres-bsn:/data/postgres
    ports:
      - 5432:5432
    restart: unless-stopped

  postgres-keycloak:
    container_name: postgres-keycloak
    image: postgres
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      PGDATA: /data/postgres
      POSTGRES_DB: keycloak
    volumes:
      - postgres-keycloak:/data/postgres
    ports:
      - 5433:5432
    networks:
      - bsn-dev
    restart: unless-stopped

  mail-dev:
    container_name: mail-dev-bsn
    image: maildev/maildev
    ports:
      - 1080:1080
      - 1025:1025

  keycloak:
    container_name: keycloak-bsn
    image: bsn/keycloak
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: dev
      KC_BOOTSTRAP_ADMIN_PASSWORD: dev
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: dev
      KC_DB_PASSWORD: dev
      BSN_USERS_API_URL: http://host.docker.internal:8088/api/v1/users
    command:
      - "start-dev"
    ports:
      - 9090:8080
    networks:
      - bsn-dev
    depends_on:
      - postgres-keycloak

volumes:
  postgres-bsn:
    driver: local
  postgres-keycloak:
    driver: local

networks:
  bsn-dev:
    driver: bridge