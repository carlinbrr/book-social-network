# Local docker-compose.yml file

services:
  postgres-bsn:
    container_name: postgres-bsn
    image: postgres:18
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: book_social_network
    volumes:
      - bsn-data:/var/lib/postgresql/18/docker
    ports:
      - 5432:5432
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
    networks:
      - bsn-dev
    restart: unless-stopped

  postgres-keycloak:
    container_name: postgres-keycloak
    image: postgres:18
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: keycloak
    volumes:
      - keycloak-data:/var/lib/postgresql/18/docker
    ports:
      - 5433:5432
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
    networks:
      - bsn-dev
    restart: unless-stopped

  mail-dev:
    container_name: mail-dev-bsn
    image: maildev/maildev
    ports:
      - 1080:1080
      - 1025:1025
    networks:
      - bsn-dev
    restart: unless-stopped

  keycloak:
    container_name: keycloak-bsn
    build:
      context: ./keycloak-spi
      dockerfile: Dockerfile
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: dev
      KC_BOOTSTRAP_ADMIN_PASSWORD: dev
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres-keycloak:5432/keycloak
      KC_DB_USERNAME: dev
      KC_DB_PASSWORD: dev
      BSN_USERS_API_URL: http://host.docker.internal:8080/api/v1/users
    command:
      - "start-dev"
    ports:
      - 9090:8080
    networks:
      - bsn-dev
    restart: unless-stopped
    depends_on:
      - postgres-keycloak

volumes:
  bsn-data:
    driver: local
  keycloak-data:
    driver: local

networks:
  bsn-dev:
    driver: bridge