services:
  postgres:
    container_name: postgres-sql-bsn
    image: postgres
    environment:
      POSTGRES_USER: username
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data
      POSTGRES_DB: book_social_network
    volumes:
      - postgres:/data/postgres
    ports:
      - 5432:5432
    networks:
      - spring-demo
    restart: unless-stopped

  bsn-api:
    container_name: bsn-api
    image: carlinbrr/bsn-api:2.0.0
    ports:
      - 8088:8088
    environment:
      # PostgreSQL variables
      POSTGRESQL_DB_URL: jdbc:postgresql://postgres-sql-bsn:5432/book_social_network
      POSTGRESQL_DB_USERNAME: username
      POSTGRESQL_DB_PASSWORD: password
      # Frontend host variable
      FRONTEND_HOST: ${FRONTEND_HOST}
      # Email variables
      EMAIL_HOST_NAME: ${EMAIL_HOST_NAME}
      EMAIL_USER_NAME: ${EMAIL_USER_NAME}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD}
    networks:
      - spring-demo
    depends_on:
      - postgres

  bsn-ui:
    container_name: bsn-ui
    image: carlinbrr/bsn-ui:2.0.0
    ports:
      - 80:80
    networks:
      - spring-demo
    depends_on:
      - bsn-api

networks:
  spring-demo:
    driver: bridge

volumes:
  postgres:
    driver: local