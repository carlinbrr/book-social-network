name: BSN Release Pipeline

on:
  push:
    branches:
      - feature/Pipeline-aws-enhancement

jobs:
  generate-infra:
    name: Generate Infra
    runs-on: ubuntu-24.04
    environment: Cloud
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'

      - name: Build CDK Jar
        run: |
          set -eu
          echo "Building CDK jar..."
          cd infra/cdk
          chmod +x mvnw
          ./mvnw clean package
          echo "CDK jar built successfully"

      - name: Run CDK Jar
        env:
          ROOT_DB_USER: ${{ secrets.ROOT_DB_USER }}
          API_DDL_USER: ${{ secrets.API_DDL_USER }}
          API_DML_USER: ${{ secrets.API_DML_USER }}
          KEYCLOAK_DB_USER: ${{ secrets.KEYCLOAK_DB_USER }}
          ALB_CERTIFICATE_ARN: ${{ vars.ALB_CERTIFICATE_ARN }}
          CLOUDFRONT_CERTIFICATE_ARN: ${{ vars.CLOUDFRONT_CERTIFICATE_ARN }}
          HOSTED_ZONE_ID: ${{ vars.HOSTED_ZONE_ID }}
          BSN_DOMAIN: ${{ vars.BSN_DOMAIN }}
          MAIL_HOST: ${{ vars.MAIL_HOST }}
          MAIL_PORT: ${{ vars.MAIL_PORT }}
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          BSN_USERS_API_URL: ${{ vars.BSN_USERS_API_URL }}
          JWT_ISSUER_URI: ${{ vars.JWT_ISSUER_URI }}
          KEYCLOAK_HOST: ${{ vars.KEYCLOAK_HOST }}
          KEYCLOAK_ADMIN_USER: ${{ secrets.KEYCLOAK_ADMIN_USER }}
          KEYCLOAK_ADMIN_PASSWORD: ${{ secrets.KEYCLOAK_ADMIN_PASSWORD }}
          REPOSITORY_NAME: ${{ secrets.DOCKERHUB_USERNAME }}
          TAG_VERSION: latest
        run: |
          set -eu
          echo "Synthesizing CloudFormation templates with CDK jar..."
          cd infra/cdk
          java -jar target/cdk-1.0-SNAPSHOT.jar
          echo "CDK synthesis completed"

      - name: Upload CloudFormation Stacks
        uses: actions/upload-artifact@v4
        with:
          name: cdk-out
          path: infra/cdk/cdk.out

  deploy-network:
    name: Deploy Network
    runs-on: ubuntu-24.04
    needs: generate-infra
    outputs:
      vpc_private_subnet_1: ${{ steps.resource-outputs.outputs.vpc_private_subnet_1 }}
      vpc_private_subnet_2: ${{ steps.resource-outputs.outputs.vpc_private_subnet_2 }}
      ecs_sg: ${{ steps.resource-outputs.outputs.ecs_sg }}
    steps:
      - name: Download CloudFormation Stacks
        uses: actions/download-artifact@v8
        with:
          name: cdk-out
          path: infra/cdk/cdk.out

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Stack
        run: |
          set -eu
          cd infra/cdk

          echo "Deploying Network..."
          aws cloudformation deploy \
            --stack-name Network \
            --template-file cdk.out/Network.template.json
          echo "Network deployed successfully"

      - name: Read & Save Stack Outputs
        id: resource-outputs
        run: |
          set -eu
          echo "Reading Network outputs..."

          VPC_PRIVATE_SUBNET_1=$(aws cloudformation describe-stacks \
            --stack-name Network \
            --query "Stacks[0].Outputs[?OutputKey=='bsnSubnetPrivate1Id'].OutputValue" \
            --output text)

          VPC_PRIVATE_SUBNET_2=$(aws cloudformation describe-stacks \
            --stack-name Network \
            --query "Stacks[0].Outputs[?OutputKey=='bsnSubnetPrivate2Id'].OutputValue" \
            --output text)

          ECS_SG=$(aws cloudformation describe-stacks \
            --stack-name Network \
            --query "Stacks[0].Outputs[?OutputKey=='bsnEcsSgId'].OutputValue" \
            --output text)

          echo "Resolved Network Stack outputs successfully"
          echo "VPC private subnet 1 id: $VPC_PRIVATE_SUBNET_1"
          echo "VPC private subnet 2 id: $VPC_PRIVATE_SUBNET_2"
          echo "ECS security group id: $ECS_SG"

          echo "vpc_private_subnet_1=$VPC_PRIVATE_SUBNET_1" >> "$GITHUB_OUTPUT"
          echo "vpc_private_subnet_2=$VPC_PRIVATE_SUBNET_2" >> "$GITHUB_OUTPUT"
          echo "ecs_sg=$ECS_SG" >> "$GITHUB_OUTPUT"

  deploy-storage:
    name: Deploy Storage
    runs-on: ubuntu-24.04
    needs: deploy-network
    steps:
      - name: Download CloudFormation Stacks
        uses: actions/download-artifact@v8
        with:
          name: cdk-out
          path: infra/cdk/cdk.out

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Stack
        run: |
          set -eu
          cd infra/cdk

          echo "Deploying Storage..."
          aws cloudformation deploy \
            --stack-name Storage \
            --template-file cdk.out/Storage.template.json
          echo "Storage deployed successfully"

  deploy-compute:
    name: Deploy Compute
    runs-on: ubuntu-24.04
    needs: deploy-network
    steps:
      - name: Download CloudFormation Stacks
        uses: actions/download-artifact@v8
        with:
          name: cdk-out
          path: infra/cdk/cdk.out

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Stack
        run: |
          set -eu
          cd infra/cdk

          echo "Deploying Compute..."
          aws cloudformation deploy \
            --stack-name Compute \
            --template-file cdk.out/Compute.template.json
          echo "Compute deployed successfully"

  deploy-migrations:
    name: Deploy Migrations
    runs-on: ubuntu-24.04
    needs: [deploy-network, deploy-storage, deploy-compute]
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Migration Image to DockerHub
        uses: docker/build-push-action@v7
        with:
          context: platform/database
          file: platform/database/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bsn-migration:latest

      - name: Download CloudFormation Stacks
        uses: actions/download-artifact@v8
        with:
          name: cdk-out
          path: infra/cdk/cdk.out

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Stack
        run: |
          set -eu
          cd infra/cdk

          echo "Deploying Migration..."
          aws cloudformation deploy \
            --stack-name Migration \
            --template-file cdk.out/Migration.template.json \
            --capabilities CAPABILITY_IAM
          echo "Migration deployed successfully"

      - name: Run Task
        env:
          VPC_PRIVATE_SUBNET_1: ${{ needs.deploy-network.outputs.vpc_private_subnet_1 }}
          VPC_PRIVATE_SUBNET_2: ${{ needs.deploy-network.outputs.vpc_private_subnet_2 }}
          ECS_SG: ${{ needs.deploy-network.outputs.ecs_sg }}
        run: |
          set -eu
          echo "Running ECS migration task..."
          echo "Subnets: $VPC_PRIVATE_SUBNET_1, $VPC_PRIVATE_SUBNET_2"
          echo "Security group: $ECS_SG"

          TASK_ARN=$(aws ecs run-task \
            --cluster bsn \
            --launch-type FARGATE \
            --task-definition bsn-migration \
            --network-configuration "awsvpcConfiguration={subnets=[$VPC_PRIVATE_SUBNET_1,$VPC_PRIVATE_SUBNET_2],securityGroups=[$ECS_SG],assignPublicIp=DISABLED}" \
            --query 'tasks[0].taskArn' \
            --output text)

          test -n "$TASK_ARN"
          echo "Started ECS task: $TASK_ARN"
          echo "Waiting for ECS task to stop..."

          aws ecs wait tasks-stopped \
            --cluster bsn \
            --tasks "$TASK_ARN"

          EXIT_CODE=$(aws ecs describe-tasks \
            --cluster bsn \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].containers[0].exitCode' \
            --output text)

          STOPPED_REASON=$(aws ecs describe-tasks \
            --cluster bsn \
            --tasks "$TASK_ARN" \
            --query 'tasks[0].stoppedReason' \
            --output text)

          echo "ECS task stopped"
          echo "Stopped reason: $STOPPED_REASON"
          echo "Exit code: $EXIT_CODE"

          if [ "$EXIT_CODE" != "0" ]; then
            echo "Migration task failed"
            exit 1
          fi

          echo "Migration task completed successfully"

  deploy-services:
    name: Deploy Services
    runs-on: ubuntu-24.04
    needs: deploy-migrations
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push API Image to DockerHub
        uses: docker/build-push-action@v7
        with:
          context: apps/api
          file: apps/api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bsn-api:latest

      - name: Build & Push Keycloak Image to DockerHub
        uses: docker/build-push-action@v7
        with:
          context: platform/iam
          file: platform/iam/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/bsn-keycloak:latest

      - name: Download CloudFormation Stacks
        uses: actions/download-artifact@v8
        with:
          name: cdk-out
          path: infra/cdk/cdk.out

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Stack
        run: |
          set -eu
          cd infra/cdk

          echo "Deploying Services..."
          aws cloudformation deploy \
            --stack-name Services \
            --template-file cdk.out/Services.template.json \
            --capabilities CAPABILITY_IAM
          echo "Services deployed successfully"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-24.04
    environment: Cloud
    needs: generate-infra
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup NodeJS
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: apps/web/package-lock.json

      - name: Install envsubst
        run: |
          set -eu
          sudo apt-get update
          sudo apt-get install -y gettext-base

      - name: Install dependencies
        run: |
          set -eu
          cd apps/web
          npm ci

      - name: Build Application
        env:
          API_URL: ${{ vars.API_URL }}
          KEYCLOAK_URL: ${{ vars.KEYCLOAK_URL }}
          KEYCLOAK_REALM: ${{ vars.KEYCLOAK_REALM }}
          KEYCLOAK_CLIENT: ${{ vars.KEYCLOAK_CLIENT }}
        run: |
          set -eu
          cd apps/web
          echo "Generating frontend runtime configuration..."
          envsubst < config/environment-cloud.json > src/assets/environment.json
          echo "Generated cloud environment.json"
          echo "Building frontend application..."
          npm run build
          echo "Frontend application built successfully"

      - name: Download CloudFormation Stacks
        uses: actions/download-artifact@v8
        with:
          name: cdk-out
          path: infra/cdk/cdk.out

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Stack
        run: |
          set -eu
          cd infra/cdk

          echo "Deploying Frontend..."
          aws cloudformation deploy \
            --stack-name Frontend \
            --template-file cdk.out/Frontend.template.json
          echo "Frontend deployed successfully"

      - name: Read & Save Stack Outputs
        id: resource-outputs
        run: |
          set -eu
          echo "Reading Frontend outputs..."

          MAIN_CF_DISTRIBUTION=$(aws cloudformation describe-stacks \
            --stack-name Frontend \
            --query "Stacks[0].Outputs[?OutputKey=='bsnMainCfDistributionId'].OutputValue" \
            --output text)

          echo "Resolved Frontend stack outputs successfully"
          echo "Main CloudFront distribution id: $MAIN_CF_DISTRIBUTION"

          echo "main_cf_distribution=$MAIN_CF_DISTRIBUTION" >> "$GITHUB_OUTPUT"

      - name: Upload Assets to S3
        run: |
          set -eu

          echo "Uploading frontend assets to S3..."
          aws s3 sync apps/web/dist/web/browser s3://bsn-main --delete
          echo "Frontend assets uploaded successfully"

      - name: Invalidate CloudFront Distribution
        env:
          MAIN_CF_DISTRIBUTION: ${{ steps.resource-outputs.outputs.main_cf_distribution }}
        run: |
          set -eu

          echo "Invalidating CloudFront distribution $MAIN_CF_DISTRIBUTION..."
          aws cloudfront create-invalidation \
            --distribution-id $MAIN_CF_DISTRIBUTION \
            --paths "/*"
          echo "CloudFront invalidation created successfully"

  deploy-dns:
    name: Deploy DNS
    runs-on: ubuntu-24.04
    needs: [deploy-services, deploy-frontend]
    steps:
      - name: Download CloudFormation Stacks
        uses: actions/download-artifact@v8
        with:
          name: cdk-out
          path: infra/cdk/cdk.out

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy Stack
        run: |
          set -eu
          cd infra/cdk

          echo "Deploying DNS..."
          aws cloudformation deploy \
            --stack-name DNS \
            --template-file cdk.out/DNS.template.json
          echo "DNS deployed successfully"