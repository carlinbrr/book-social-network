name: Destroy

on:
  workflow_dispatch:
    inputs:
      confirm_message:
        description: "Type CONFIRM for full application & infrastructure deletion"
        required: true
        type: string

jobs:
  validate-input:
    runs-on: ubuntu-24.04
    steps:
      - name: Validate input
        env:
          CONFIRM_MESSAGE: ${{ inputs.confirm_message }}
        run: |
          set -eu
          if [ "$CONFIRM_MESSAGE" != "CONFIRM" ]; then
            echo "Confirmation failed"
            exit 1
          fi
          echo "Confirmation accepted"

  destroy-dns:
    name: Destroy DNS
    runs-on: ubuntu-24.04
    needs: validate-input
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Delete Stack
        run: |
          set -eu

          echo "Deleting DNS..."
          aws cloudformation delete-stack \
            --stack-name DNS
          echo "Waiting for DNS deletion..."
          aws cloudformation wait stack-delete-complete \
            --stack-name DNS
          echo "DNS deleted successfully"

  destroy-migrations:
    name: Destroy Migrations
    runs-on: ubuntu-24.04
    needs: validate-input
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Delete Stack
        run: |
          set -eu

          echo "Deleting Migration..."
          aws cloudformation delete-stack \
            --stack-name Migration
          echo "Waiting for Migration deletion..."
          aws cloudformation wait stack-delete-complete \
            --stack-name Migration
          echo "Migration deleted successfully"

  destroy-frontend:
    name: Destroy Frontend
    runs-on: ubuntu-24.04
    needs: destroy-dns
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Remove Assets from S3
        run: |
          set -eu

          echo "Removing frontend assets from S3..."
          aws s3 rm s3://bsn-main --recursive
          echo "Frontend assets removed successfully"

      - name: Delete Stack
        run: |
          set -eu

          echo "Deleting Frontend..."
          aws cloudformation delete-stack \
            --stack-name Frontend
          echo "Waiting for Frontend deletion..."
          aws cloudformation wait stack-delete-complete \
            --stack-name Frontend
          echo "Frontend deleted successfully"

  destroy-services:
    name: Destroy Services
    runs-on: ubuntu-24.04
    needs: destroy-dns
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Delete Stack
        run: |
          set -eu

          echo "Deleting Services..."
          aws cloudformation delete-stack \
            --stack-name Services
          echo "Waiting for Services deletion..."
          aws cloudformation wait stack-delete-complete \
            --stack-name Services
          echo "Services deleted successfully"

  destroy-database:
    name: Destroy Database
    runs-on: ubuntu-24.04
    needs: destroy-services
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Delete Stack
        run: |
          set -eu

          echo "Deleting Database..."
          aws cloudformation delete-stack \
            --stack-name Database
          echo "Waiting for Database deletion..."
          aws cloudformation wait stack-delete-complete \
            --stack-name Database
          echo "Database deleted successfully"

  destroy-file-system:
    name: Destroy File System
    runs-on: ubuntu-24.04
    needs: destroy-services
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Delete Stack
        run: |
          set -eu

          echo "Deleting FileSystem..."
          aws cloudformation delete-stack \
            --stack-name FileSystem
          echo "Waiting for FileSystem deletion..."
          aws cloudformation wait stack-delete-complete \
            --stack-name FileSystem
          echo "FileSystem deleted successfully"

  destroy-compute:
    name: Destroy Compute
    runs-on: ubuntu-24.04
    needs: destroy-services
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Delete Stack
        run: |
          set -eu

          echo "Deleting Compute..."
          aws cloudformation delete-stack \
            --stack-name Compute
          echo "Waiting for Compute deletion..."
          aws cloudformation wait stack-delete-complete \
            --stack-name Compute
          echo "Compute deleted successfully"

  destroy-network:
    name: Destroy Network
    runs-on: ubuntu-24.04
    needs: [destroy-database, destroy-file-system, destroy-compute]
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Delete Stack
        run: |
          set -eu

          echo "Deleting Network..."
          aws cloudformation delete-stack \
            --stack-name Network
          echo "Waiting for Network deletion..."
          aws cloudformation wait stack-delete-complete \
            --stack-name Network
          echo "Network deleted successfully"