name: BSN Backend API Pipeline

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  compile:
    runs-on: ubuntu-latest
    name: Compile project
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'corretto'

      - name: Compile project
        run: |
          cd book-network-api
          chmod +x mvnw
          ./mvnw clean compile

  unit-tests:
    runs-on: ubuntu-latest
    name: Unit tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'corretto'

      - name: Run unit tests
        run: |
          cd book-network-api
          chmod +x mvnw
          ./mvnw clean test

  build:
    runs-on: ubuntu-latest
    name: Build backend image
    needs:
      - compile
      - unit-tests
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set tag version
        run: |
          cd book-network-api
          TAG_VERSION=${GITHUB_REF#refs/tags/}
          TAG_VERSION=${TAG_VERSION#v}
          echo "TAG_VERSION=$TAG_VERSION" >> $GITHUB_ENV
          ./mvnw versions:set -DnewVersion=$TAG_VERSION

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push to DockerHub
        uses: docker/build-push-action@v5
        with:
          context: book-network-api
          file: book-network-api/Dockerfile
          push: true
          platforms: linux/amd64
          tags:  ${{ secrets.DOCKERHUB_USERNAME }}/bsn-api:${{ env.TAG_VERSION }},${{ secrets.DOCKERHUB_USERNAME }}/bsn-api:latest

  deploy:
    name: Deploy backend
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ci-cd
            sudo docker-compose pull -q
            sudo docker-compose up -d